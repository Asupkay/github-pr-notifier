<!DOCTYPE html>
<html>
  <head>
    <title>GitHub Pull Request Notifier</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <form id="tokenForm" autocomplete="off">
      <label for="tokenField">GitHub token:</label>
      <input type="text" id="tokenField" name="tokenField"/>
      <button type="submit">Submit</button>
    </form>
    <div id="prBlock">
      <h2>Your PR reviews</h2>
      <ul id="prList"></ul>
      <div id="lastPrUpdate"></div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
